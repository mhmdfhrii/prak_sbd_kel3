<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css">

    <title>Detail Mahasiswa</title>
</head>

<body class="container mt-5">

<div class="row justify-content-center">
<div class="col-md-6">

<div class="card shadow">
    <div class="card-header bg-primary text-white text-center">
        <h4>Detail Mahasiswa</h4>
    </div>

    <div class="card-body">

        <div class="form-group">
            <label><b>NIM</b></label>
            <p class="form-control" th:text="${mahasiswa.nim}"></p>
        </div>

        <div class="form-group">
            <label><b>Nama</b></label>
            <p class="form-control" th:text="${mahasiswa.nama}"></p>
        </div>

        <div class="form-group">
            <label><b>Angkatan</b></label>
            <p class="form-control" th:text="${mahasiswa.angkatan}"></p>
        </div>

        <div class="form-group">
            <label><b>Gender</b></label>
            <p class="form-control" th:text="${mahasiswa.gender}"></p>
        </div>

        <a href="/" class="btn btn-secondary btn-block mt-3">
            Kembali
        </a>

    </div>
</div>

</div>
</div>

<!-- Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.3/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/js/bootstrap.min.js"></script>

</body>
</html>
