<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css">

    <title>Edit Mahasiswa</title>
</head>

<body class="container mt-5">

<h1 class="text-center">Edit Mahasiswa</h1>

<p th:if="${error}" class="text-danger" th:text="${error}"></p>

<form action="/edit" method="post">

    <div class="form-group">
        <label>NIM</label>
        <input type="text"
               class="form-control"
               name="nim"
               th:value="${mahasiswa.nim}"
               readonly>
    </div>

    <div class="form-group">
        <label>Nama</label>
        <input type="text"
               class="form-control"
               name="nama"
               th:value="${mahasiswa.nama}">
    </div>

    <div class="form-group">
        <label>Angkatan</label>
        <input type="text"
               class="form-control"
               name="angkatan"
               th:value="${mahasiswa.angkatan}">
    </div>

    <div class="form-group">
        <label>Gender</label>
        <input type="text"
               class="form-control"
               name="gender"
               th:value="${mahasiswa.gender}">
    </div>

    <button type="submit" class="btn btn-primary">Update</button>
    <a href="/" class="btn btn-secondary">Kembali</a>

</form>

</body>
</html>
