<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css">

    <title>Mahasiswa</title>
</head>

<body class="container mt-5">

    <h1 class="text-center">Daftar Mahasiswa (Kelompok 03)</h1>

    <a href="/add" class="btn btn-success w-100 mt-4">
        Tambah Mahasiswa
    </a>

    <!-- SEARCH -->
    <input 
        type="text" 
        id="searchInput" 
        class="form-control mt-3"
        placeholder="Search mahasiswa..."
    >

    <!-- MULTI DELETE FORM -->
    <form action="/multidelete" method="post">

        <div class="mt-3">

            <table class="table table-bordered" id="tableMahasiswa">

                <thead class="thead-dark">
                    <tr>
                        <th>
                            <input type="checkbox" id="checkAll">
                        </th>
                        <th>Nama</th>
                        <th>Angkatan</th>
                        <th>Gender</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody>

                    <tr th:each="mhs : ${mahasiswa}">

                        <td>
                            <input 
                                type="checkbox" 
                                name="nim" 
                                th:value="${mhs.nim}"
                            >
                        </td>

                        <td th:text="${mhs.nama}"></td>
                        <td th:text="${mhs.angkatan}"></td>
                        <td th:text="${mhs.gender}"></td>

                        <td>

                            <a 
                                th:href="@{/detail/{nim}(nim=${mhs.nim})}"
                                class="btn btn-info btn-sm">
                                Detail
                            </a>

                            <a 
                                th:href="@{/edit/{nim}(nim=${mhs.nim})}"
                                class="btn btn-primary btn-sm">
                                Edit
                            </a>

                            <a 
                                th:href="@{/delete/{nim}(nim=${mhs.nim})}"
                                class="btn btn-danger btn-sm">
                                Delete
                            </a>

                        </td>

                    </tr>

                </tbody>

            </table>

            <button type="submit" class="btn btn-danger">
                Delete Selected
            </button>

        </div>

    </form>

    <!-- SEARCH REALTIME -->
    <script>

        document.getElementById("searchInput").addEventListener("keyup", function () {

            let input = this.value.toLowerCase();
            let rows = document.querySelectorAll("#tableMahasiswa tbody tr");

            rows.forEach(function (row) {

                let text = row.textContent.toLowerCase();

                if (text.includes(input)) {
                    row.style.display = "";
                } else {
                    row.style.display = "none";
                }

            });

        });

    </script>

    <!-- CHECK ALL -->
    <script>

        document.getElementById("checkAll").addEventListener("click", function () {

            let checkboxes = document.querySelectorAll('input[name="nim"]');

            checkboxes.forEach(cb => cb.checked = this.checked);

        });

    </script>

    <!-- Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.3/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/js/bootstrap.min.js"></script>

</body>
</html>
